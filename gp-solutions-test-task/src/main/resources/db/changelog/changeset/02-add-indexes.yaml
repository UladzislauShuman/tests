databaseChangeLog:
    - changeSet:
          id: 2
          author: vlad
          changes:
              - createIndex:
                    tableName: hotel
                    indexName: idx_hotel_name
                    columns:
                        - column: { name: name }

              - createIndex:
                    tableName: hotel
                    indexName: idx_hotel_brand
                    columns:
                        - column: { name: brand }

              - createIndex:
                    tableName: hotel
                    indexName: idx_hotel_city
                    columns:
                        - column: { name: city }

              -   createIndex:
                      tableName: hotel
                      indexName: idx_hotel_country
                      columns:
                          -   column: { name: country }

              - createIndex:
                    tableName: hotel_amenities
                    indexName: idx_hotel_amenity_id
                    columns:
                        - column: { name: amenity_id }